<nav class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <div class="logo-wrapper">
      <div class="logo-icon">
        <span class="diamond"></span>
      </div>
      <div class="logo-text" *ngIf="!isCollapsed">
        <span class="app-title">MAPUS</span>
        <span class="app-subtitle">APU · OBRA CIVIL</span>
      </div>
    </div>
    <button class="toggle-btn" (click)="isCollapsed = !isCollapsed">
      <span class="menu-icon">☰</span>
    </button>
  </div>

  <ul class="nav-menu">
    <li class="nav-item">
      <a class="nav-link" routerLink="/dashboard-apus" routerLinkActive="active">
        <span class="icon">📊</span>
        <span class="text" *ngIf="!isCollapsed">Dashboard</span>
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" routerLink="/nuevos-apu-ia" routerLinkActive="active">
        <span class="icon">🤖</span>
        <span class="text" *ngIf="!isCollapsed">Nuevos APUS-IA</span>
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" routerLink="/analisis-apu" routerLinkActive="active">
        <span class="icon">📋</span>
        <span class="text" *ngIf="!isCollapsed">Análisis APU</span>
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" routerLink="/chat-apus" routerLinkActive="active">
        <span class="icon">💬</span>
        <span class="text" *ngIf="!isCollapsed">Consulta</span>
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" routerLink="/consulta-apus" routerLinkActive="active">
        <span class="icon">📁</span>
        <span class="text" *ngIf="!isCollapsed">Banco de APUS</span>
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" routerLink="/historico-precios" routerLinkActive="active">
        <span class="icon">📈</span>
        <span class="text" *ngIf="!isCollapsed">Histórico Precios</span>
      </a>
    </li>

    <li class="nav-item" *ngIf="isAdmin">
      <a class="nav-link" routerLink="/usuarios" routerLinkActive="active">
        <span class="icon">👥</span>
        <span class="text" *ngIf="!isCollapsed">Usuarios</span>
      </a>
    </li>

    <li class="nav-item notif-item" *ngIf="isLoggedIn">
      <button class="nav-link notif-btn" type="button" (click)="toggleNotifPanel()">
        <span class="icon">🔔</span>
        <span class="text" *ngIf="!isCollapsed">Notificaciones</span>
        <span class="notif-badge" *ngIf="(notif.noLeidas$ | async) as count">
          <ng-container *ngIf="count > 0">{{ count > 99 ? '99+' : count }}</ng-container>
        </span>
      </button>

      <div class="notif-panel" *ngIf="showNotifPanel">
        <div class="notif-panel-header">
          <strong>Notificaciones</strong>
          <button type="button" class="notif-mark-all" (click)="marcarTodas()">Marcar todas leídas</button>
        </div>
        <div class="notif-list">
          <div class="notif-empty" *ngIf="(notif.notificaciones$ | async)?.length === 0">
            No tienes notificaciones.
          </div>
          <button
            type="button"
            class="notif-entry"
            [class.unread]="!n.leida"
            *ngFor="let n of notif.notificaciones$ | async"
            (click)="abrirNotificacion(n)">
            <span class="notif-titulo">
              <span class="notif-dot" *ngIf="!n.leida"></span>
              {{ n.titulo }}
            </span>
            <span class="notif-mensaje">{{ n.mensaje }}</span>
            <span class="notif-fecha">{{ n.created_at | date:'dd/MM/yyyy HH:mm' }}</span>
          </button>
        </div>
      </div>
    </li>
  </ul>


  <div class="sidebar-footer">
    <div class="user-section" *ngIf="isLoggedIn && !isCollapsed">
      <span class="user-name">{{ currentUser?.nombre }}</span>
      <span class="user-rol">{{ currentUser?.rol }}</span>
      <button class="logout-btn" (click)="logout()">Cerrar Sesión</button>
    </div>
    <div class="login-link" *ngIf="!isLoggedIn && !isCollapsed">
      <a routerLink="/login" class="nav-link">🔐 Iniciar Sesión</a>
    </div>
    <div class="engine-indicator" *ngIf="!isCollapsed">
      <span class="indicator-dot"></span>
      <span class="indicator-text">Gemini · Activo</span>
    </div>
  </div>
</nav>
