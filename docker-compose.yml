services:
  mysql:
    image: mysql:8.0
    container_name: mapus-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: postgres
      MYSQL_DATABASE: apus_mab
      MYSQL_USER: postgres
      MYSQL_PASSWORD: postgres
    volumes:
      - mysqldata:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mapus-api
    restart: unless-stopped
    ports:
      - "10000:10000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: apus_mab
      DB_USER: postgres
      DB_PASSWORD: postgres
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash
      CORS_ORIGINS: http://localhost:4200
      ENV: production
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mapus-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mysqldata:
